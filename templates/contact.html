{% extends 'base.html' %}
{% block title %}Contact - École Events{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div style="
                background: linear-gradient(145deg, #161616, #1f1f1f);
                border: 1px solid rgba(212,175,55,0.2);
                border-radius: 24px;
                padding: 45px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            ">
                <div style="text-align:center; margin-bottom:30px;">
                    <div style="font-size:4rem; margin-bottom:15px;">📞</div>
                    <h2 style="color:white; font-weight:700;">Contactez-nous</h2>
                    <p style="color:rgba(255,255,255,0.4);">Une question ? Une suggestion ? Écrivez-nous !</p>
                </div>

                <form method="POST" action="{{ url_for('contact') }}">
                    <div class="mb-3">
                        <label style="color:rgba(255,255,255,0.6); font-weight:500; font-size:0.9rem;">👤 Votre nom</label>
                        <input type="text" name="name" class="form-control form-control-lg" 
                               placeholder="Votre nom complet" required
                               style="background:#1f1f1f !important; border:1px solid rgba(212,175,55,0.15) !important; border-radius:12px !important; color:white !important; padding:14px 18px !important;">
                    </div>
                    <div class="mb-3">
                        <label style="color:rgba(255,255,255,0.6); font-weight:500; font-size:0.9rem;">📧 Votre email</label>
                        <input type="email" name="email" class="form-control form-control-lg" 
                               placeholder="votre@email.com" required
                               style="background:#1f1f1f !important; border:1px solid rgba(212,175,55,0.15) !important; border-radius:12px !important; color:white !important; padding:14px 18px !important;">
                    </div>
                    <div class="mb-3">
                        <label style="color:rgba(255,255,255,0.6); font-weight:500; font-size:0.9rem;">📝 Sujet</label>
                        <input type="text" name="subject" class="form-control form-control-lg" 
                               placeholder="Sujet de votre message" required
                               style="background:#1f1f1f !important; border:1px solid rgba(212,175,55,0.15) !important; border-radius:12px !important; color:white !important; padding:14px 18px !important;">
                    </div>
                    <div class="mb-4">
                        <label style="color:rgba(255,255,255,0.6); font-weight:500; font-size:0.9rem;">💬 Message</label>
                        <textarea name="message" class="form-control" rows="5" 
                                  placeholder="Écrivez votre message ici..." required
                                  style="background:#1f1f1f !important; border:1px solid rgba(212,175,55,0.15) !important; border-radius:12px !important; color:white !important; padding:14px 18px !important;"></textarea>
                    </div>
                    <button type="submit" class="btn-gold" style="padding:16px; border-radius:12px;">
                        📤 Envoyer le message
                    </button>
                </form>

                <hr style="border-color:rgba(212,175,55,0.15); margin:30px 0;">

                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; text-align:center;">
                    <div>
                        <div style="font-size:2rem; margin-bottom:10px;">📧</div>
                        <div style="color:rgba(255,255,255,0.3); font-size:0.8rem;">Email</div>
                        <div style="color:#d4af37; font-size:0.85rem; font-weight:500;">mohamedelhamraoui913@gmail.com</div>
                    </div>
                    <div>
                        <div style="font-size:2rem; margin-bottom:10px;">📱</div>
                        <div style="color:rgba(255,255,255,0.3); font-size:0.8rem;">Téléphone</div>
                        <div style="color:#d4af37; font-size:0.85rem; font-weight:500;">0625429410</div>
                    </div>
                    <div>
                        <div style="font-size:2rem; margin-bottom:10px;">📍</div>
                        <div style="color:rgba(255,255,255,0.3); font-size:0.8rem;">Adresse</div>
                        <div style="color:#d4af37; font-size:0.85rem; font-weight:500;">Casablanca, Maroc</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
