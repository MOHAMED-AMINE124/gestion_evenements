{% extends 'base.html' %}
{% block title %}Inscription - École Events{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="text-center mb-4">
            <svg style="width:80px; height:80px;" viewBox="0 0 680 380">
                <defs>
                    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f5e07a"/>
                        <stop offset="50%" style="stop-color:#d4af37"/>
                        <stop offset="100%" style="stop-color:#9a7400"/>
                    </linearGradient>
                </defs>
                <circle cx="340" cy="175" r="120" fill="#111111" stroke="url(#gr)" stroke-width="2.5"/>
                <circle cx="340" cy="175" r="108" fill="none" stroke="url(#gr)" stroke-width="0.7" opacity="0.35"/>
                <circle cx="340" cy="72" r="2.5" fill="url(#gr)" opacity="0.5"/>
                <circle cx="340" cy="278" r="2.5" fill="url(#gr)" opacity="0.5"/>
                <circle cx="237" cy="175" r="2.5" fill="url(#gr)" opacity="0.5"/>
                <circle cx="443" cy="175" r="2.5" fill="url(#gr)" opacity="0.5"/>
                <text x="340" y="213" font-family="Georgia, serif" font-size="88" font-weight="700" fill="url(#gr)" text-anchor="middle" letter-spacing="-2">GE</text>
                <line x1="275" y1="228" x2="405" y2="228" stroke="url(#gr)" stroke-width="0.7" opacity="0.35"/>
                <polygon points="340,224 343,228 340,232 337,228" fill="url(#gr)" opacity="0.6"/>
            </svg>
            <h3 class="mt-3">Créer un compte</h3>
            <p class="subtitle mt-1">Rejoignez École Events</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input type="text" name="full_name" class="form-control form-control-lg"
                       placeholder="Votre nom complet" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control form-control-lg"
                       placeholder="votre@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control form-control-lg"
                       placeholder="••••••••" required>
                <small style="color:rgba(255,255,255,0.35);">Au moins 3 caractères</small>
            </div>
            <div class="mb-4">
                <label class="form-label">Rôle</label>
                <select name="role" class="form-select form-select-lg">
                    <option value="student">Étudiant</option>
                    <option value="teacher">Professeur</option>
                    <option value="admin">Administrateur</option>
                </select>
            </div>
            <button type="submit" class="btn-gold">
                S'inscrire
            </button>
        </form>

        <hr class="gold-divider">

        <div class="text-center">
            <p style="color:rgba(255,255,255,0.45); font-size:0.9rem;">
                Déjà un compte?
                <a href="{{ url_for('auth.login') }}" class="gold-link"> Se connecter</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
