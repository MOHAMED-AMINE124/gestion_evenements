{% extends 'base.html' %}
{% block title %}Réinitialiser mot de passe - École Events{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="text-center mb-4">
            <svg style="width:80px; height:80px;" viewBox="0 0 680 380">
                <defs>
                    <linearGradient id="grp" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f5e07a"/>
                        <stop offset="50%" style="stop-color:#d4af37"/>
                        <stop offset="100%" style="stop-color:#9a7400"/>
                    </linearGradient>
                </defs>
                <circle cx="340" cy="175" r="120" fill="#111111" stroke="url(#grp)" stroke-width="2.5"/>
                <circle cx="340" cy="175" r="108" fill="none" stroke="url(#grp)" stroke-width="0.7" opacity="0.35"/>
                <circle cx="340" cy="72" r="2.5" fill="url(#grp)" opacity="0.5"/>
                <circle cx="340" cy="278" r="2.5" fill="url(#grp)" opacity="0.5"/>
                <circle cx="237" cy="175" r="2.5" fill="url(#grp)" opacity="0.5"/>
                <circle cx="443" cy="175" r="2.5" fill="url(#grp)" opacity="0.5"/>
                <text x="340" y="213" font-family="Georgia, serif" font-size="88" font-weight="700" fill="url(#grp)" text-anchor="middle" letter-spacing="-2">GE</text>
                <line x1="275" y1="228" x2="405" y2="228" stroke="url(#grp)" stroke-width="0.7" opacity="0.35"/>
                <polygon points="340,224 343,228 340,232 337,228" fill="url(#grp)" opacity="0.6"/>
            </svg>
            <h3 class="mt-3">Nouveau mot de passe</h3>
            <p class="subtitle mt-1">Code envoyé à <strong style="color:#d4af37;">{{ email }}</strong></p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Code de vérification</label>
                <input type="text" name="code" class="form-control form-control-lg text-center"
                       placeholder="000000" maxlength="6" required
                       style="font-size:1.5rem; letter-spacing:8px; font-weight:700;">
            </div>
            <div class="mb-4">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" name="new_password" class="form-control form-control-lg"
                       placeholder="••••••••" required oninput="checkPassword(this.value)">
                <div style="margin-top:10px; display:flex; flex-direction:column; gap:5px;">
                    <small id="check-length" style="color:rgba(255,255,255,0.35);">✗ Au moins 8 caractères</small>
                    <small id="check-upper" style="color:rgba(255,255,255,0.35);">✗ Au moins une majuscule</small>
                    <small id="check-number" style="color:rgba(255,255,255,0.35);">✗ Au moins un chiffre</small>
                </div>
            </div>
            <button type="submit" class="btn-gold">
                Réinitialiser le mot de passe
            </button>
        </form>

        <hr class="gold-divider">

        <div class="text-center">
            <p style="color:rgba(255,255,255,0.45); font-size:0.9rem;">
                <a href="{{ url_for('auth.login') }}" class="gold-link">← Retour à la connexion</a>
            </p>
        </div>
    </div>
</div>

<script>
function checkPassword(value) {
    const length = document.getElementById('check-length');
    const upper = document.getElementById('check-upper');
    const number = document.getElementById('check-number');

    if (value.length >= 8) {
        length.style.color = '#d4af37';
        length.textContent = '✓ Au moins 8 caractères';
    } else {
        length.style.color = 'rgba(255,255,255,0.35)';
        length.textContent = '✗ Au moins 8 caractères';
    }

    if (/[A-Z]/.test(value)) {
        upper.style.color = '#d4af37';
        upper.textContent = '✓ Au moins une majuscule';
    } else {
        upper.style.color = 'rgba(255,255,255,0.35)';
        upper.textContent = '✗ Au moins une majuscule';
    }

    if (/[0-9]/.test(value)) {
        number.style.color = '#d4af37';
        number.textContent = '✓ Au moins un chiffre';
    } else {
        number.style.color = 'rgba(255,255,255,0.35)';
        number.textContent = '✗ Au moins un chiffre';
    }
}
</script>

{% endblock %}
