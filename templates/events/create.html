{% extends 'base.html' %}
{% block title %}Créer un événement - École Events{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div style="background:#161616; border:1px solid rgba(212,175,55,0.2); border-radius:24px; padding:45px;">

                <div class="text-center mb-4">
                    <div class="gold-icon">
                        <span style="font-size:1.8rem;">📅</span>
                    </div>
                    <h3 style="color:white; font-weight:700;">Créer un événement</h3>
                    <p style="color:rgba(255,255,255,0.45);">Remplissez les informations de votre événement</p>
                </div>

                <form method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Titre de l'événement</label>
                        <input type="text" name="title" class="form-control form-control-lg"
                               placeholder="Ex: Journée Portes Ouvertes" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4"
                                  placeholder="Décrivez votre événement..." required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Date et heure</label>
                            <input type="datetime-local" name="event_date" class="form-control form-control-lg" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lieu</label>
                            <input type="text" name="location" class="form-control form-control-lg"
                                   placeholder="Ex: Salle principale" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre de places</label>
                            <input type="number" name="total_seats" class="form-control form-control-lg"
                                   placeholder="Ex: 100" min="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prix (MAD)</label>
                            <input type="number" name="price" class="form-control form-control-lg"
                                   placeholder="0 = Gratuit" min="0" step="0.01" value="0">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Photo de l'événement</label>
                        <input type="file" name="image" class="form-control form-control-lg" accept="image/*">
                        <small style="color:rgba(255,255,255,0.35);">Formats acceptés: JPG, PNG, GIF</small>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn-gold flex-grow-1">
                            Créer l'événement
                        </button>
                        <a href="{{ url_for('events.list_events') }}"
                           style="background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1); padding:14px 25px; border-radius:12px; text-decoration:none; font-weight:500; white-space:nowrap;">
                            Annuler
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
